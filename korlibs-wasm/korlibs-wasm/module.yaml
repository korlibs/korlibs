dependencies:
  - org.korge:korlibs-platform:6.1.0
  - org.korge:korlibs-memory:6.1.0: exported
  - org.korge:korlibs-logger:6.1.0: exported
  - org.korge:korlibs-math-core:6.1.0: exported
  - org.korge:korlibs-datastructure:6.1.0: exported
  - org.korge:korlibs-compression:6.1.0

dependencies@android:
  - org.korge:korlibs-serialization:6.1.0

dependencies@jvm:
  - org.ow2.asm:asm:9.9.1
  - org.ow2.asm:asm-util:9.9.1

test-dependencies:
