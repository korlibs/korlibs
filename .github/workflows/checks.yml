name: Run checks
# https://docs.github.com/en/actions/learn-github-actions/expressions

on:
  push:
    branches: [ main, 'release/**' ]
    paths:
      - '**'
      - '!**.gitignore'
      - '!**.md'
      - '!**.github/workflows/*'
  pull_request:
    branches: [ main, 'release/**' ]
    paths:
      - '**'
      - '!**.gitignore'
      - '!**.md'
      - '!**.github/workflows/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true

  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: zulu

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        include:
          - outputKey: macos
            os: macos-latest
          - outputKey: ubuntu
            os: ubuntu-latest
            enableAndroid: true
            enableCodecov: true
          - outputKey: windows
            os: windows-latest
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: "Use Node.js 24.x"
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.x # https://github.com/actions/setup-node/releases/tag/v6.3.0
      - name: "Set up JDK"
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: "${{ env.JAVA_DISTRIBUTION }}"
          java-version: "${{ env.JAVA_VERSION }}" # https://github.com/actions/setup-java/releases/tag/v5.2.0
      - name: "Prepare Gradle"
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # https://github.com/gradle/actions/releases/tag/v6.0.1
      - name: "Cache Kotlin/Native .konan folder"
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: "~/.konan"
          key: "${{ runner.os }}-konan"
          restore-keys: "${{ runner.os }}-konan" # https://github.com/actions/cache/releases/tag/v5.0.4
      - name: "Run check"
        run: "./gradlew check"
      - name: "Enable KVM"
        if: "${{ matrix.enableAndroid }}"
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: "Run Android Tests"
        if: "${{ matrix.enableAndroid }}"
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          "api-level": 21
          "script": "./gradlew androidConnectedCheck lint" # https://github.com/ReactiveCircus/android-emulator-runner/releases/tag/v2.37.0
      - name: "Archive Test Results"
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: "test-results-${{ matrix.outputKey }}"
          retention-days: 21
          path: "**/build/reports"
          if-no-files-found: ignore # https://github.com/actions/upload-artifact/releases/tag/v7.0.0
      - name: "Code coverage"
        if: "${{ matrix.enableCodecov }}"
        run: "./gradlew koverXmlReport"
      - name: "Upload coverage reports to Codecov"
        if: "${{ matrix.enableCodecov }}"
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          token: "${{ secrets.CODECOV_TOKEN }}" # https://github.com/codecov/codecov-action/releases/tag/v6.0.0
